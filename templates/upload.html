{% extends "base.html" %}
{% block title %}上传简历 - {{ app_name }}{% endblock %}

{% block content %}
<div class="container py-5">
    <h2 class="mb-4 fw-bold"><i class="fa-solid fa-cloud-upload-alt me-2"></i>上传简历</h2>

    <!-- 岗位选择 -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3">1. 选择目标岗位</h5>
            <div class="row g-3">
                <div class="col-md-4">
                    <select id="categorySelect" class="form-select">
                        <option value="">全部类别</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <select id="positionSelect" class="form-select">
                        <option value="">请先选择岗位类别</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- 上传区域 -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3">2. 上传简历文件</h5>
            <div id="uploadZone" class="upload-zone">
                <div class="upload-icon"><i class="fa-solid fa-file-pdf"></i> <i class="fa-solid fa-file-word"></i></div>
                <h5>拖拽文件到此区域 或 点击选择</h5>
                <p class="text-muted">支持 PDF (.pdf) 和 Word (.docx/.doc) 格式，最大10MB</p>
                <input type="file" id="fileInput" accept=".pdf,.docx,.doc" hidden>
                <button id="selectBtn" class="btn btn-outline-primary mt-2">
                    <i class="fa-solid fa-folder-open me-1"></i>选择文件
                </button>
                <div id="fileInfo" class="mt-3 d-none">
                    <span class="badge bg-primary fs-6" id="fileName"></span>
                    <button id="clearFileBtn" class="btn btn-sm btn-outline-danger ms-2">
                        <i class="fa-solid fa-times"></i>
                    </button>
                </div>
            </div>
            <button id="submitBtn" class="btn btn-primary btn-lg w-100 mt-3 d-none" disabled>
                <i class="fa-solid fa-rocket me-2"></i>提交评估
            </button>
        </div>
    </div>

    <!-- 处理进度 -->
    <div id="progressCard" class="card shadow-sm border-0 mb-4 d-none">
        <div class="card-body text-center py-4">
            <div class="spinner-border text-primary mb-3" role="status"></div>
            <h5 id="progressText">正在处理简历...</h5>
            <p class="text-muted" id="progressDetail">请稍候，这可能需要几秒钟</p>
            <div class="progress mt-3" style="height: 8px;">
                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 30%"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// 检查登录状态
const token = localStorage.getItem('access_token');
if (!token) { window.location.href = '/login'; }

const headers = { 'Authorization': 'Bearer ' + token };

// 加载岗位类别和岗位列表
async function loadPositions() {
    try {
        const res = await fetch('/api/v1/positions/categories');
        const categories = await res.json();
        const catSelect = document.getElementById('categorySelect');
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat.id;
            opt.textContent = cat.name;
            catSelect.appendChild(opt);
        });
    } catch(e) { console.error('Failed to load categories', e); }
}

document.getElementById('categorySelect').addEventListener('change', async function() {
    const catId = this.value;
    const posSelect = document.getElementById('positionSelect');
    posSelect.innerHTML = '<option value="">加载中...</option>';

    if (!catId) {
        posSelect.innerHTML = '<option value="">请先选择岗位类别</option>';
        return;
    }

    try {
        const url = `/api/v1/positions?category_id=${catId}`;
        const res = await fetch(url);
        const positions = await res.json();
        posSelect.innerHTML = '<option value="">选择岗位（可选）</option>';
        positions.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = p.name;
            posSelect.appendChild(opt);
        });
    } catch(e) { console.error('Failed to load positions', e); }
});

// 文件选择交互
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const selectBtn = document.getElementById('selectBtn');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const clearFileBtn = document.getElementById('clearFileBtn');
const submitBtn = document.getElementById('submitBtn');
let selectedFile = null;

selectBtn.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('click', (e) => { if (e.target === uploadZone) fileInput.click(); });

uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const files = e.dataTransfer.files;
    if (files.length > 0) handleFile(files[0]);
});

fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
});

function handleFile(file) {
    const ext = '.' + file.name.split('.').pop().toLowerCase();
    if (!['.pdf', '.docx', '.doc'].includes(ext)) {
        alert('不支持的文件格式，请上传PDF或Word文档');
        return;
    }
    if (file.size > 10 * 1024 * 1024) {
        alert('文件过大，最大支持10MB');
        return;
    }
    selectedFile = file;
    fileName.textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
    fileInfo.classList.remove('d-none');
    submitBtn.classList.remove('d-none');
    submitBtn.disabled = false;
}

clearFileBtn.addEventListener('click', () => {
    selectedFile = null;
    fileInput.value = '';
    fileInfo.classList.add('d-none');
    submitBtn.classList.add('d-none');
});

// 提交并轮询
submitBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    submitBtn.disabled = true;
    document.getElementById('progressCard').classList.remove('d-none');

    const formData = new FormData();
    formData.append('file', selectedFile);
    const posId = document.getElementById('positionSelect').value;
    if (posId) formData.append('position_id', posId);

    try {
        const res = await fetch('/api/v1/resumes/upload', {
            method: 'POST', headers: headers, body: formData
        });
        const data = await res.json();
        if (!res.ok) { alert(data.detail || '上传失败'); return; }

        // 轮询状态
        const resumeId = data.resume_id;
        let progress = 30;
        const bar = document.getElementById('progressBar');

        const poll = setInterval(async () => {
            try {
                const sr = await fetch(`/api/v1/resumes/${resumeId}/status`, { headers });
                const sd = await sr.json();
                progress = Math.min(95, progress + 10);
                bar.style.width = progress + '%';

                if (sd.status === 'completed') {
                    clearInterval(poll);
                    bar.style.width = '100%';
                    bar.classList.remove('progress-bar-animated');
                    bar.classList.add('bg-success');
                    document.getElementById('progressText').textContent = '处理完成！';
                    document.getElementById('progressDetail').textContent = '即将跳转至评估报告...';
                    setTimeout(() => { window.location.href = '/report/' + resumeId; }, 1000);
                } else if (sd.status === 'failed') {
                    clearInterval(poll);
                    bar.classList.remove('progress-bar-animated');
                    bar.classList.add('bg-danger');
                    document.getElementById('progressText').textContent = '处理失败';
                    document.getElementById('progressDetail').textContent = sd.error || '未知错误';
                }
            } catch(e) { console.error(e); }
        }, 1000);
    } catch(e) {
        alert('上传失败: ' + e.message);
        submitBtn.disabled = false;
        document.getElementById('progressCard').classList.add('d-none');
    }
});

loadPositions();
</script>
{% endblock %}
